<!DOCTYPE html>
<html lang="nl" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PackageTracker</title>
  <style>
    /* ── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    input  { font: inherit; border: none; outline: none; background: none; width: 100%; }

    /* ── Design tokens (light) ───────────────────────────────────── */
    :root {
      --accent:     #4F8EF7;
      --accent-dk:  #3A7AE4;
      --green:      #34C759;
      --red:        #FF3B30;
      --orange:     #FF9500;

      --bg:         #F2F2F7;
      --surface:    #FFFFFF;
      --surface-2:  #F9F9FB;
      --border:     #E5E5EA;
      --text:       #1C1C1E;
      --text-2:     #6E6E73;
      --text-3:     #AEAEB2;

      --shadow-sm:  0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow:     0 4px 20px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.05);

      --r:    14px;
      --r-sm:  8px;
      --r-xs:  6px;

      --courier-bpost:  #E3051B;
      --courier-postnl: #FF6200;
      --courier-dhl:    #FFCC00;

      --transition: .2s ease;
    }

    /* ── Dark mode (system) ──────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:        #000000;
        --surface:   #1C1C1E;
        --surface-2: #2C2C2E;
        --border:    #3A3A3C;
        --text:      #F5F5F7;
        --text-2:    #98989D;
        --text-3:    #636366;
        --shadow-sm: 0 1px 4px rgba(0,0,0,.3);
        --shadow:    0 4px 20px rgba(0,0,0,.4);
        --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
      }
    }
    /* ── Dark mode (forced) ──────────────────────────────────────── */
    [data-theme="dark"] {
      --bg:        #000000;
      --surface:   #1C1C1E;
      --surface-2: #2C2C2E;
      --border:    #3A3A3C;
      --text:      #F5F5F7;
      --text-2:    #98989D;
      --text-3:    #636366;
      --shadow-sm: 0 1px 4px rgba(0,0,0,.3);
      --shadow:    0 4px 20px rgba(0,0,0,.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
    }

    /* ── Base ────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .wrap {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -.3px;
    }
    .logo-icon {
      font-size: 22px;
      line-height: 1;
    }
    .theme-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: background var(--transition), transform .1s;
    }
    .theme-btn:hover   { background: var(--border); }
    .theme-btn:active  { transform: scale(.92); }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition);
    }

    /* ── Search card ─────────────────────────────────────────────── */
    .search-card {
      margin-top: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .field label span { font-weight: 400; text-transform: none; letter-spacing: 0; }
    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0 14px;
      height: 46px;
      transition: border-color .15s;
      gap: 8px;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .input-wrap svg { flex-shrink: 0; color: var(--text-3); }
    .input-wrap input { color: var(--text); }
    .input-wrap input::placeholder { color: var(--text-3); }

    .row { display: flex; gap: 12px; align-items: flex-end; }
    .row .field { flex: 1; }
    .row .field:first-child { flex: 2; }

    .btn-track {
      height: 46px;
      padding: 0 22px;
      border-radius: var(--r-sm);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      display: flex; align-items: center; gap: 6px;
      transition: background .15s, transform .1s, box-shadow .15s;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .btn-track:hover  { background: var(--accent-dk); }
    .btn-track:active { transform: scale(.97); }
    .btn-track:disabled {
      background: var(--text-3);
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-track svg { transition: transform .2s; }
    .btn-track:not(:disabled):hover svg { transform: translateX(2px); }

    /* ── Results area ────────────────────────────────────────────── */
    #results { margin-top: 20px; }

    /* ── Skeleton ────────────────────────────────────────────────── */
    @keyframes shimmer {
      from { background-position: -400px 0; }
      to   { background-position:  400px 0; }
    }
    .skeleton {
      border-radius: var(--r);
      background: linear-gradient(
        90deg,
        var(--surface-2) 25%,
        var(--border) 50%,
        var(--surface-2) 75%
      );
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skel-hero   { height: 150px; margin-bottom: 12px; }
    .skel-event  { height: 76px;  margin-bottom: 8px;  }

    /* ── Error card ──────────────────────────────────────────────── */
    .error-card {
      background: color-mix(in srgb, var(--red) 8%, var(--surface));
      border: 1.5px solid color-mix(in srgb, var(--red) 25%, transparent);
      border-radius: var(--r);
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .error-icon {
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .error-title { font-weight: 600; color: var(--red); margin-bottom: 4px; }
    .error-body  { color: var(--text-2); font-size: 14px; line-height: 1.5; }

    /* ── Status hero ─────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .fade-up { animation: fadeUp .3s ease both; }

    .hero-card {
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .hero-bar {
      height: 5px;
    }
    .hero-body {
      background: var(--surface);
      padding: 20px 20px 18px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .courier-badge {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
    }
    .hero-meta {
      flex: 1;
      min-width: 0;
    }
    .hero-courier {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text-2);
      margin-bottom: 2px;
    }
    .hero-tracking {
      font-size: 13px;
      color: var(--text-3);
      font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      color: #fff;
      margin-top: 12px;
    }
    .hero-desc {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-top: 10px;
      line-height: 1.4;
    }
    .hero-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .hero-sub-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-2);
    }
    .hero-sub-item svg { color: var(--text-3); flex-shrink: 0; }

    /* ── Timeline section ────────────────────────────────────────── */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-2);
      margin: 24px 0 12px 4px;
    }
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .tl-item {
      display: flex;
      gap: 0;
      opacity: 0;
      animation: fadeUp .3s ease forwards;
    }
    /* Stagger delay set inline via JS */

    .tl-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 36px;
      flex-shrink: 0;
    }
    .tl-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      font-weight: 700;
      border: 2.5px solid;
      background: var(--surface);
      position: relative;
      z-index: 1;
    }
    .tl-dot.active {
      background: var(--status-color, var(--accent));
      border-color: var(--status-color, var(--accent));
      color: #fff;
    }
    .tl-dot.inactive {
      border-color: var(--border);
      color: var(--text-3);
      background: var(--surface);
    }
    .tl-line {
      flex: 1;
      width: 2px;
      background: var(--border);
      margin: 2px 0;
    }
    .tl-card {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      margin: 0 0 8px 10px;
      box-shadow: var(--shadow-sm);
      transition: background var(--transition);
    }
    .tl-card.active {
      border-color: color-mix(in srgb, var(--status-color, var(--accent)) 30%, transparent);
      box-shadow: 0 2px 12px color-mix(in srgb, var(--status-color, var(--accent)) 12%, transparent),
                  var(--shadow-sm);
    }
    .tl-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .tl-ts {
      font-size: 12px;
      color: var(--text-3);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tl-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--status-color, var(--accent)) 15%, transparent);
      color: var(--status-color, var(--accent));
    }
    .tl-desc {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .tl-loc {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-2);
      margin-top: 5px;
    }

    /* ── Empty / initial state ───────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-2);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; line-height: 1; }
    .empty-title { font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: 14px; }

    /* ── Courier picker ──────────────────────────────────────────── */
    .courier-picker {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .courier-opt {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
      user-select: none;
      white-space: nowrap;
    }
    .courier-opt:hover { border-color: var(--accent); color: var(--text); }
    .courier-opt.selected {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Language switcher ───────────────────────────────────────── */
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .lang-btns {
      display: flex;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }
    .lang-btn {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      transition: background .15s, color .15s;
      letter-spacing: .3px;
    }
    .lang-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .lang-btn:hover:not(.active) { color: var(--text); }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .row { flex-direction: column; gap: 14px; }
      .btn-track { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📬</span>
        <span>PackageTracker</span>
      </div>
      <div class="header-actions">
        <div class="lang-btns" id="langBtns">
          <button class="lang-btn active" data-lang="nl">NL</button>
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="theme-btn" id="themeBtn">🌙</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <!-- ── Search ───────────────────────────────────────────────── -->
    <div class="card search-card">
      <div class="field">
        <label id="labelTracking">Trackingnummer</label>
        <div class="input-wrap">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="numberInput"
                 type="text"
                 placeholder="bijv. 323204736100000008192030"
                 autocomplete="off"
                 spellcheck="false" />
        </div>
      </div>
      <div class="field">
        <label id="labelCourier">Vervoerder <span id="labelCourierOpt">(optioneel)</span></label>
        <div class="courier-picker" id="courierPicker">
          <button class="courier-opt selected" data-courier="" id="autoDetectBtn">🔍 Auto-detect</button>
          <button class="courier-opt" data-courier="bpost">📮 bpost</button>
          <button class="courier-opt" data-courier="postnl">📦 PostNL</button>
          <button class="courier-opt" data-courier="dhl">📫 DHL</button>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label id="labelPostal">Postcode <span id="labelPostalOpt">(optioneel)</span></label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17.657 16.657L13.414 20.9a2 2 0 0 1-2.828 0L6.343 16.657a8 8 0 1 1 11.314 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
            </svg>
            <input id="postalInput"
                   type="text"
                   placeholder="bijv. 9160"
                   autocomplete="off" />
          </div>
        </div>
        <button class="btn-track" id="trackBtn">
          <span id="trackBtnLabel">Zoeken</span>
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Results ──────────────────────────────────────────────── -->
    <div id="results">
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <div class="empty-title" id="emptyTitle">Geen pakket geselecteerd</div>
        <div class="empty-sub" id="emptySub">Voer een trackingnummer in om de status op te zoeken.</div>
      </div>
    </div>
  </div>

  <script>
    // ── Translations ─────────────────────────────────────────────
    const LANGS = {
      nl: {
        trackingLabel:  "Trackingnummer",
        courierLabel:   "Vervoerder",
        postalLabel:    "Postcode",
        optional:       "(optioneel)",
        autoDetect:     "🔍 Auto-detect",
        searchBtn:      "Zoeken",
        loading:        "Bezig…",
        trackingPh:     "bijv. 323204736100000008192030",
        postalPh:       "bijv. 9160",
        emptyTitle:     "Geen pakket geselecteerd",
        emptySub:       "Voer een trackingnummer in om de status op te zoeken.",
        errorTitle:     "Opzoeken mislukt",
        postalTip:      "<strong>Tip:</strong> Voeg een postcode toe voor dit pakkettype.",
        serverErr:      "Kon de server niet bereiken. Is de server actief?",
        history:        n => `Geschiedenis — ${n} event${n !== 1 ? "s" : ""}`,
        status: { DELIVERED: "Afgeleverd", TRANSIT: "Onderweg", EXCEPTION: "Probleem" },
        locale: "nl-BE",
      },
      fr: {
        trackingLabel:  "Numéro de suivi",
        courierLabel:   "Transporteur",
        postalLabel:    "Code postal",
        optional:       "(optionnel)",
        autoDetect:     "🔍 Auto-détect",
        searchBtn:      "Chercher",
        loading:        "Chargement…",
        trackingPh:     "ex. 323204736100000008192030",
        postalPh:       "ex. 9160",
        emptyTitle:     "Aucun colis sélectionné",
        emptySub:       "Entrez un numéro de suivi pour consulter le statut.",
        errorTitle:     "Échec de la recherche",
        postalTip:      "<strong>Conseil :</strong> Ajoutez un code postal pour ce type de colis.",
        serverErr:      "Impossible de joindre le serveur. Est-il en cours d'exécution ?",
        history:        n => `Historique — ${n} événement${n !== 1 ? "s" : ""}`,
        status: { DELIVERED: "Livré", TRANSIT: "En transit", EXCEPTION: "Problème" },
        locale: "fr-BE",
      },
      en: {
        trackingLabel:  "Tracking number",
        courierLabel:   "Carrier",
        postalLabel:    "Postal code",
        optional:       "(optional)",
        autoDetect:     "🔍 Auto-detect",
        searchBtn:      "Search",
        loading:        "Loading…",
        trackingPh:     "e.g. 323204736100000008192030",
        postalPh:       "e.g. 9160",
        emptyTitle:     "No parcel selected",
        emptySub:       "Enter a tracking number to look up the status.",
        errorTitle:     "Lookup failed",
        postalTip:      "<strong>Tip:</strong> Add a postal code for this parcel type.",
        serverErr:      "Could not reach the server. Is it running?",
        history:        n => `History — ${n} event${n !== 1 ? "s" : ""}`,
        status: { DELIVERED: "Delivered", TRANSIT: "In transit", EXCEPTION: "Exception" },
        locale: "en-GB",
      },
    };

    // ── Constants ────────────────────────────────────────────────
    const STATUS_META = {
      DELIVERED: { color: "#34C759", icon: "✓" },
      TRANSIT:   { color: "#4F8EF7", icon: "→" },
      EXCEPTION: { color: "#FF3B30", icon: "✕" },
    };
    const COURIER_META = {
      bpost:  { name: "bpost",  icon: "📮", color: "#E3051B" },
      postnl: { name: "PostNL", icon: "📦", color: "#FF6200" },
      dhl:    { name: "DHL",    icon: "📫", color: "#D40511" },
    };

    // ── Language ─────────────────────────────────────────────────
    let lang = localStorage.getItem("lang") || "nl";
    const langBtns = document.getElementById("langBtns");

    langBtns.addEventListener("click", e => {
      const btn = e.target.closest(".lang-btn");
      if (!btn) return;
      applyLang(btn.dataset.lang);
    });

    function applyLang(l) {
      if (!LANGS[l]) return;
      lang = l;
      localStorage.setItem("lang", l);
      const L = LANGS[l];

      // Header buttons
      langBtns.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === l);
      });

      // Form labels
      document.getElementById("labelTracking").firstChild.textContent = L.trackingLabel;
      document.getElementById("labelCourier").firstChild.textContent  = L.courierLabel + " ";
      document.getElementById("labelCourierOpt").textContent          = L.optional;
      document.getElementById("labelPostal").firstChild.textContent   = L.postalLabel + " ";
      document.getElementById("labelPostalOpt").textContent           = L.optional;

      // Inputs
      document.getElementById("numberInput").placeholder = L.trackingPh;
      document.getElementById("postalInput").placeholder = L.postalPh;

      // Auto-detect button
      document.getElementById("autoDetectBtn").textContent = L.autoDetect;

      // Track button (only when not loading)
      const _btn = document.getElementById("trackBtn");
      if (_btn && !_btn.disabled) {
        const _lbl = document.getElementById("trackBtnLabel");
        if (_lbl) _lbl.textContent = L.searchBtn;
      }

      // Empty state
      document.getElementById("emptyTitle").textContent = L.emptyTitle;
      document.getElementById("emptySub").textContent   = L.emptySub;
    }

    applyLang(lang);

    // ── Theme ────────────────────────────────────────────────────
    const root  = document.documentElement;
    const thBtn = document.getElementById("themeBtn");
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) applyTheme(savedTheme);

    thBtn.addEventListener("click", () => {
      const isDark = root.getAttribute("data-theme") === "dark"
        || (root.getAttribute("data-theme") !== "light"
            && matchMedia("(prefers-color-scheme: dark)").matches);
      applyTheme(isDark ? "light" : "dark");
    });

    function applyTheme(t) {
      root.setAttribute("data-theme", t);
      thBtn.textContent = t === "dark" ? "☀️" : "🌙";
      localStorage.setItem("theme", t);
    }

    // ── Tracking ─────────────────────────────────────────────────
    const numIn    = document.getElementById("numberInput");
    const posIn    = document.getElementById("postalInput");
    const trackBtn = document.getElementById("trackBtn");
    const results  = document.getElementById("results");
    const courierPicker = document.getElementById("courierPicker");
    let selectedCourier = "";

    courierPicker.addEventListener("click", e => {
      const btn = e.target.closest(".courier-opt");
      if (!btn) return;
      courierPicker.querySelectorAll(".courier-opt").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedCourier = btn.dataset.courier;
    });

    numIn.addEventListener("keydown",  e => e.key === "Enter" && doTrack());
    posIn.addEventListener("keydown",  e => e.key === "Enter" && doTrack());
    trackBtn.addEventListener("click", doTrack);

    async function doTrack() {
      const number = numIn.value.trim();
      if (!number) { numIn.focus(); shake(numIn.closest(".input-wrap")); return; }
      const postal = posIn.value.trim() || null;

      setLoading(true);
      try {
        const params = new URLSearchParams({ tracking_number: number });
        if (postal) params.set("postal_code", postal);
        if (selectedCourier) params.set("courier", selectedCourier);
        const res  = await fetch(`/api/track?${params}`);
        const data = await res.json();
        if (data.error) renderError(data.error, data.error.toLowerCase().includes("postal"));
        else            renderResult(data);
      } catch (e) {
        renderError(LANGS[lang].serverErr);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      trackBtn.disabled = on;
      if (on) {
        trackBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               style="animation:spin .8s linear infinite">
             <path stroke-linecap="round" d="M12 2a10 10 0 0 1 10 10"/>
           </svg> ${LANGS[lang].loading}`;
        results.innerHTML = skeletonHTML();
      } else {
        trackBtn.innerHTML = `<span id="trackBtnLabel">${LANGS[lang].searchBtn}</span>
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/>
          </svg>`;
      }
    }

    // ── Renderers ────────────────────────────────────────────────
    function renderError(msg, needsPostal = false) {
      const L = LANGS[lang];
      const hint = needsPostal ? `<br>${L.postalTip}` : "";
      results.innerHTML = `
        <div class="error-card fade-up">
          <div class="error-icon">⚠️</div>
          <div>
            <div class="error-title">${L.errorTitle}</div>
            <div class="error-body">${escHtml(msg)}${hint}</div>
          </div>
        </div>`;
    }

    function renderResult(d) {
      const L      = LANGS[lang];
      const latest = d.latest_event;
      const sm     = STATUS_META[latest.status_code] ?? STATUS_META.TRANSIT;
      const slabel = L.status[latest.status_code] ?? latest.status_code;
      const cm     = COURIER_META[d.courier] ?? { name: d.courier, icon: "📦", color: "#4F8EF7" };
      const ts     = fmtDate(latest.timestamp);

      const heroHTML = `
        <div class="hero-card fade-up">
          <div class="hero-bar" style="background:${sm.color}"></div>
          <div class="hero-body">
            <div class="courier-badge">${cm.icon}</div>
            <div class="hero-meta">
              <div class="hero-courier">${cm.name}</div>
              <div class="hero-tracking">${escHtml(d.tracking_number)}</div>
              <div>
                <span class="status-pill" style="background:${sm.color}">
                  ${sm.icon} ${slabel}
                </span>
              </div>
              <div class="hero-desc">${escHtml(latest.description || slabel)}</div>
              <div class="hero-sub">
                <span class="hero-sub-item">
                  <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                  </svg>
                  ${ts}
                </span>
                ${latest.location ? `
                <span class="hero-sub-item">
                  <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M17.657 16.657L13.414 20.9a2 2 0 0 1-2.828 0L6.343 16.657a8 8 0 1 1 11.314 0z"/>
                    <path stroke-linecap="round" d="M15 11a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                  </svg>
                  ${escHtml(latest.location)}
                </span>` : ""}
              </div>
            </div>
          </div>
        </div>`;

      const events = [...d.history].reverse();
      const tlHTML = events.map((ev, i) => {
        const s      = STATUS_META[ev.status_code] ?? STATUS_META.TRANSIT;
        const slbl   = L.status[ev.status_code] ?? ev.status_code;
        const isA    = i === 0;
        const isLast = i === events.length - 1;
        const ets    = fmtDate(ev.timestamp);
        return `
          <div class="tl-item" style="animation-delay:${i * 50}ms">
            <div class="tl-spine">
              <div class="tl-dot ${isA ? "active" : "inactive"}"
                   style="${isA ? `--status-color:${s.color}` : ""}">
                ${isA ? s.icon : "·"}
              </div>
              ${!isLast ? '<div class="tl-line"></div>' : ""}
            </div>
            <div class="tl-card ${isA ? "active" : ""}"
                 style="${isA ? `--status-color:${s.color}` : ""}">
              <div class="tl-header">
                <div class="tl-ts">${ets}</div>
                <div class="tl-badge" style="${isA ? `--status-color:${s.color}` : ""}">${slbl}</div>
              </div>
              <div class="tl-desc">${escHtml(ev.description || slbl)}</div>
              ${ev.location ? `
              <div class="tl-loc">
                <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round"
                        d="M17.657 16.657L13.414 20.9a2 2 0 0 1-2.828 0L6.343 16.657a8 8 0 1 1 11.314 0z"/>
                  <path stroke-linecap="round" d="M15 11a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                </svg>
                ${escHtml(ev.location)}
              </div>` : ""}
            </div>
          </div>`;
      }).join("");

      results.innerHTML = heroHTML
        + `<div class="section-title">${L.history(events.length)}</div>`
        + `<div class="timeline">${tlHTML}</div>`;
    }

    // ── Helpers ──────────────────────────────────────────────────
    function skeletonHTML() {
      return `<div class="skeleton skel-hero"></div>`
           + Array(3).fill('<div class="skeleton skel-event"></div>').join("");
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleString(LANGS[lang].locale, {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    }

    function escHtml(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function shake(el) {
      el.style.animation = "none";
      el.offsetHeight;
      el.style.animation = "shake .3s ease";
    }

    const style = document.createElement("style");
    style.textContent = `
      @keyframes spin  { to { transform: rotate(360deg); } }
      @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%,60% { transform: translateX(-5px); }
        40%,80% { transform: translateX( 5px); }
      }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
